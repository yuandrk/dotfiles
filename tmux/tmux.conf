# ============================================================================
# Tmux Configuration
# ============================================================================
# Modern tmux setup with sensible defaults and useful features
# Compatible with tmux 2.1+
# ============================================================================

# ============================================================================
# General Settings
# ============================================================================

# Set prefix to Ctrl-a (like screen) instead of Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when a window is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# Display tmux messages for 4 seconds
set -g display-time 4000

# Refresh status line every 5 seconds
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Don't rename windows automatically
set -g allow-rename off

# True color + modern terminfo.
# Under Ghostty the outer TERM is xterm-ghostty; keep xterm-256color too so
# colors stay correct when launched from other terminals.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:RGB"
set -ga terminal-overrides ",xterm-256color:RGB"

# ============================================================================
# Key Bindings
# ============================================================================

# Reload configuration
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Create new window in current path
bind c new-window -c "#{pane_current_path}"

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch panes using vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes using vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Switch windows using Shift-arrow without prefix
bind -n S-Left previous-window
bind -n S-Right next-window

# Move windows left/right
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# Quick window selection
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Toggle synchronize panes (send commands to all panes)
bind S setw synchronize-panes

# ============================================================================
# Copy Mode Settings (Vim-like)
# ============================================================================

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Enter copy mode with prefix + [
bind [ copy-mode

# Let tmux sync its buffer to the system clipboard via OSC 52 (Ghostty supports
# it, so copy works even over SSH).
set -g set-clipboard on

# Setup 'v' to begin selection as in Vim
bind -T copy-mode-vi v send -X begin-selection

# Yank to the system clipboard — pbcopy on macOS, xclip on Linux.
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard -i'"

# Paste with prefix + ]
bind ] paste-buffer

# ============================================================================
# Status Bar
# ============================================================================

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style bg=colour234,fg=colour137

# Left status bar
set -g status-left-length 40
set -g status-left '#[fg=colour233,bg=colour245,bold] #S #[fg=colour245,bg=colour234]'

# Right status bar
set -g status-right-length 50
set -g status-right '#[fg=colour239]#[fg=colour246,bg=colour239] %Y-%m-%d #[fg=colour245]#[fg=colour233,bg=colour245,bold] %H:%M '

# Window status
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

setw -g window-status-style fg=colour138,bg=colour235,none
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# Window activity
setw -g window-status-activity-style fg=colour81,bg=colour234,none

# Pane border colors
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour51

# Message colors
set -g message-style fg=colour232,bg=colour166,bold

# ============================================================================
# Plugins (managed by tpm)
# ============================================================================
# tpm is cloned automatically by install.sh (setup_tmux_plugins) and the
# plugins below are installed non-interactively. To do it by hand instead:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#   then press  prefix + I  inside tmux to install.

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions to disk
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save + auto-restore on start

# --- tmux-resurrect: what gets restored ---
# Layout, working directories, and nvim re-opened with its saved session.
set -g @resurrect-strategy-nvim 'session'      # restore nvim via its Session.vim
set -g @resurrect-capture-pane-contents 'on'   # restore visible scrollback/text
# No @resurrect-processes override → only resurrect's default safe set (editors,
# pagers, etc.) is relaunched; arbitrary shell programs are NOT auto-rerun.

# --- tmux-continuum: automatic persistence ---
# Saves the environment every 15 min and restores the last saved state when the
# tmux server first starts — e.g. the first time Ghostty launches after a reboot.
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# ============================================================================
# Notes
# ============================================================================
# Useful commands:
#   tmux new -s <name>           # Create new named session
#   tmux ls                      # List sessions
#   tmux attach -t <name>        # Attach to session
#   tmux kill-session -t <name>  # Kill session
#   prefix + d                   # Detach from session
#   prefix + ?                   # Show all keybindings
#   prefix + :                   # Enter command mode
